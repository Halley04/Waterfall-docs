<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Waterfall — 30 block screen concepts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --sky: #e8f4fc;
      --mid: #c5dcf5;
      --pool: #9ec5eb;
      --ink: #142033;
      --text: #1a2b3d;
      --muted: #5a6f85;
      --blue: #2b7ede;
      --teal: #3696a8;
      --deep: #4a5a9e;
      --foam: #f3f8fc;
      --glass: rgba(255, 255, 255, 0.42);
      --glass-strong: rgba(255, 255, 255, 0.62);
      --border: rgba(255, 255, 255, 0.55);
      --page: #0f1724;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Figtree, sans-serif;
      background: var(--page);
      color: #e8eef6;
      padding: 32px 24px 80px;
    }

    header {
      max-width: 1280px;
      margin: 0 auto 28px;
    }
    header h1 {
      font-family: Fraunces, serif;
      font-weight: 700;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      margin: 0 0 8px;
      letter-spacing: -0.02em;
    }
    header p {
      margin: 0;
      color: #94a8c0;
      max-width: 56ch;
      line-height: 1.5;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
      align-items: center;
    }
    .toolbar button {
      border: 1px solid #2a3a52;
      background: #162033;
      color: #d7e4f5;
      border-radius: 999px;
      padding: 8px 14px;
      font: 500 13px Figtree, sans-serif;
      cursor: pointer;
    }
    .toolbar button.active {
      background: var(--blue);
      border-color: var(--blue);
      color: white;
    }
    .note {
      font-size: 13px;
      color: #7f93ab;
      margin-left: auto;
    }

    .grid {
      max-width: 1280px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 28px 20px;
    }

    .card {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      padding: 0 4px;
    }
    .meta .id {
      font-size: 12px;
      font-weight: 700;
      color: #8eb4e8;
      letter-spacing: 0.04em;
    }
    .meta .name {
      font-size: 13px;
      color: #c5d4e6;
      text-align: right;
    }

    .phone {
      aspect-ratio: 9 / 19.5;
      border-radius: 28px;
      overflow: hidden;
      position: relative;
      border: 2px solid #2c3c55;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      background: linear-gradient(180deg, var(--sky), var(--mid) 48%, var(--pool));
      color: var(--text);
    }
    .phone::before {
      content: "";
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 78px;
      height: 12px;
      background: #0f1724;
      border-radius: 999px;
      z-index: 5;
      opacity: 0.85;
    }
    .screen {
      position: absolute;
      inset: 0;
      padding: 42px 16px 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 10px;
    }

    .brand {
      font-family: Fraunces, serif;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--ink);
    }
    .eyebrow {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .title {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.2;
      color: var(--ink);
      margin: 0;
    }
    .body {
      font-size: 11.5px;
      line-height: 1.45;
      color: var(--muted);
      margin: 0;
      max-width: 22ch;
    }
    .glass {
      background: var(--glass);
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      padding: 16px 14px;
      width: 100%;
    }
    .btn {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 10px 12px;
      font: 700 11.5px Figtree, sans-serif;
      cursor: default;
    }
    .btn-primary {
      background: var(--blue);
      color: white;
    }
    .btn-ghost {
      background: var(--glass-strong);
      color: var(--ink);
      border: 1px solid var(--border);
    }
    .icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(145deg, #7aa7e8, #4a6db5);
      display: grid;
      place-items: center;
      color: white;
      font-weight: 800;
      font-size: 14px;
      margin: 0 auto 4px;
    }
    .icon.round { border-radius: 50%; }
    .stack { display: flex; flex-direction: column; gap: 8px; width: 100%; }
    .row { display: flex; gap: 8px; width: 100%; align-items: center; justify-content: center; }
    .tiny { font-size: 10px; color: var(--muted); }
    .big-num {
      font-family: Fraunces, serif;
      font-size: 42px;
      line-height: 0.95;
      color: var(--ink);
      font-weight: 700;
    }
    .ring {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 3px solid rgba(43, 126, 222, 0.25);
      border-top-color: var(--blue);
      display: grid;
      place-items: center;
    }
    .mist {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 10%, rgba(255,255,255,0.55), transparent 50%),
        radial-gradient(ellipse at 80% 30%, rgba(255,255,255,0.35), transparent 45%),
        linear-gradient(180deg, var(--sky), var(--mid) 55%, var(--pool));
      z-index: 0;
    }
    .content { position: relative; z-index: 1; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }

    /* Variants with darker/mood backgrounds override .phone */
    .phone.deep { background: linear-gradient(180deg, #1a2b4a, #2b4a6e 50%, #3a6a8a); color: #e8f0f8; }
    .phone.deep .title, .phone.deep .brand, .phone.deep .big-num { color: #f4f8fc; }
    .phone.deep .body, .phone.deep .eyebrow, .phone.deep .tiny { color: #b7c9dc; }
    .phone.deep .glass { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.2); }
    .phone.deep .btn-ghost { background: rgba(255,255,255,0.14); color: #f4f8fc; border-color: rgba(255,255,255,0.22); }

    .phone.teal { background: linear-gradient(180deg, #d7f0f4, #9ed3de 50%, #5fadc0); }
    .phone.ink { background: linear-gradient(180deg, #102033, #142033 40%, #1c334f); color: #e8f0f8; }
    .phone.ink .title, .phone.ink .brand, .phone.ink .big-num { color: #f4f8fc; }
    .phone.ink .body, .phone.ink .eyebrow, .phone.ink .tiny { color: #9eb3cb; }
    .phone.ink .glass { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.16); }
    .phone.ink .btn-ghost { background: rgba(255,255,255,0.1); color: #f4f8fc; border-color: rgba(255,255,255,0.18); }

    .phone.foam { background: linear-gradient(180deg, #f7fbfe, #e8f4fc 60%, #d4e8f7); }

    .poster-line {
      width: 100%;
      text-align: left;
      padding: 0 4px;
    }
    .divider {
      width: 40px;
      height: 2px;
      background: var(--blue);
      opacity: 0.5;
      border-radius: 2px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--glass-strong);
      border: 1px solid var(--border);
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
    }
    .bars {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 36px;
    }
    .bars span {
      width: 5px;
      border-radius: 2px;
      background: var(--blue);
      opacity: 0.75;
    }
    .bottom-sheet {
      margin-top: auto;
      width: 100%;
      background: rgba(255,255,255,0.78);
      border-radius: 20px 20px 0 0;
      padding: 18px 14px 12px;
      border: 1px solid var(--border);
      border-bottom: 0;
    }
    .silhouette {
      width: 100%;
      height: 70px;
      background:
        radial-gradient(ellipse at 50% 100%, rgba(74,90,158,0.45), transparent 70%),
        linear-gradient(180deg, transparent 30%, rgba(43,126,222,0.18));
      border-radius: 12px;
      position: relative;
      overflow: hidden;
    }
    .silhouette::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 10%;
      right: 10%;
      height: 22px;
      background: rgba(42, 90, 150, 0.5);
      clip-path: polygon(0 40%, 12% 20%, 28% 55%, 45% 10%, 62% 50%, 78% 15%, 100% 45%, 100% 100%, 0 100%);
    }
    .filter-hide { display: none !important; }
  </style>
</head>

    const grid = document.getElementById("grid");

    function render(filter) {
      grid.innerHTML = "";
      concepts.forEach((c) => {
        if (filter !== "all" && !c.tags.includes(filter)) return;
        const card = document.createElement("article");
        card.className = "card";
        card.dataset.tags = c.tags.join(" ");
        card.innerHTML = `
          <div class="meta"><span class="id">#${c.id}</span><span class="name">${c.name}</span></div>
          <div class="phone ${c.phoneClass || ""}"><div class="screen">${c.html}</div></div>`;
        grid.appendChild(card);
      });
    }

    render("all");

    document.querySelectorAll(".toolbar button[data-filter]").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".toolbar button[data-filter]").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        render(btn.dataset.filter);
      });
    });
  </script>
